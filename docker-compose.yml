services:
  postgres:
    image: postgres:16-alpine
    container_name: mee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER env var required — see .env.example}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var required — see .env.example}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB env var required — see .env.example}
    ports:
      - "5435:5432"   # host 5435 → container 5432 (5432/5433 đang bị chiếm bởi services khác)
    volumes:
      - mee_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: mee-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula     # dark theme (đổi sang 'flat' nếu muốn light)

volumes:
  mee_pg_data:
